<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ω</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#040404;
    overflow:hidden;
    width:100vw; height:100vh;
    cursor:crosshair;
  }
  canvas { position:fixed; inset:0; }
  #shadow-canvas { top: auto; bottom:0; height:38vh; }

  /* dividing line — the wall */
  #wall {
    position:fixed;
    left:0; right:0;
    bottom:38vh;
    height:1px;
    background:linear-gradient(90deg,
      transparent 0%,
      rgba(232,228,220,0.06) 20%,
      rgba(232,228,220,0.15) 50%,
      rgba(232,228,220,0.06) 80%,
      transparent 100%
    );
  }
</style>
</head>
<body>
<canvas id="c3d"></canvas>
<canvas id="shadow-canvas"></canvas>
<div id="wall"></div>

<script>
const c3 = document.getElementById('c3d');
const ctx = c3.getContext('2d');
const cs = document.getElementById('shadow-canvas');
const sctx = cs.getContext('2d');

let W, H, SW, SH;
function resize() {
  W = c3.width  = window.innerWidth;
  H = c3.height = window.innerHeight;
  SW = cs.width  = window.innerWidth;
  SH = cs.height = window.innerHeight * 0.38;
}
resize();
window.addEventListener('resize', resize);

// viewport centers
const getCX = () => W/2;
const getCY = () => (H - SH) * 0.5;

// ── drag ─────────────────────────────────────────────────────
let rX=0.42, rY=0.0, tRX=0.42, tRY=0.0;
let drag=false, lx=0, ly=0;
c3.addEventListener('mousedown',  e=>{drag=true; lx=e.clientX; ly=e.clientY;});
window.addEventListener('mouseup',  ()=>drag=false);
window.addEventListener('mousemove', e=>{
  if(!drag) return;
  tRY += (e.clientX-lx)*0.005;
  tRX += (e.clientY-ly)*0.005;
  lx=e.clientX; ly=e.clientY;
});
c3.addEventListener('touchstart', e=>{drag=true; lx=e.touches[0].clientX; ly=e.touches[0].clientY;});
window.addEventListener('touchend', ()=>drag=false);
window.addEventListener('touchmove', e=>{
  if(!drag) return;
  tRY += (e.touches[0].clientX-lx)*0.005;
  tRX += (e.touches[0].clientY-ly)*0.005;
  lx=e.touches[0].clientX; ly=e.touches[0].clientY;
});

// ── 3D ───────────────────────────────────────────────────────
function rot(x,y,z, rx,ry) {
  let x1 = x*Math.cos(ry) + z*Math.sin(ry);
  let z1 =-x*Math.sin(ry) + z*Math.cos(ry);
  let y2 = y*Math.cos(rx) - z1*Math.sin(rx);
  let z2 = y*Math.sin(rx) + z1*Math.cos(rx);
  return [x1, y2, z2];
}
function prj(x,y,z, cx,cy) {
  const f=680, s=f/(f+z);
  return [cx+x*s, cy-y*s, s, z];
}

// ── torus geometry ───────────────────────────────────────────
const R=155, r=58;
const U=96, V=36;

function tPt(u,v) {
  return [
    (R + r*Math.cos(v))*Math.cos(u),
     r*Math.sin(v),
    (R + r*Math.cos(v))*Math.sin(u)
  ];
}

// precompute surface points
const surf = [];
for(let i=0; i<=U; i++) {
  const row=[];
  for(let j=0; j<=V; j++)
    row.push(tPt((i/U)*Math.PI*2, (j/V)*Math.PI*2));
  surf.push(row);
}

// ── dot ──────────────────────────────────────────────────────
let du=0, dv=0;
const duSpd = 0.0055;
const dvSpd = 0.0055 * Math.PI; // irrational — never repeats

const TRAIL = 280;
const trail = [];

// shadow path history — what the 2D projection draws
const SHADOW_HIST = 600;
const shadowHist = []; // [{x,y}]

// ── draw torus wireframe ──────────────────────────────────────
function drawTorus3D(rx,ry) {
  const CX=getCX(), CY=getCY();

  // project all points
  const p = surf.map(row => row.map(([x,y,z]) => {
    const [rx2,ry2,rz2] = rot(x,y,z,rx,ry);
    return prj(rx2,ry2,rz2, CX,CY);
  }));

  // u-rings (cross-sections of tube)
  for(let i=0; i<U; i+=3) {
    ctx.beginPath();
    for(let j=0; j<=V; j++) {
      const [px,py,,pz] = p[i][j];
      // depth-fade
      const depthA = 0.04 + 0.08 * (1 - (pz+300)/600);
      j===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
    }
    ctx.strokeStyle='rgba(232,228,220,0.07)';
    ctx.lineWidth=0.45;
    ctx.stroke();
  }

  // v-lines (along tube length)
  for(let j=0; j<V; j+=6) {
    ctx.beginPath();
    for(let i=0; i<=U; i++) {
      const [px,py] = p[i][j];
      i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
    }
    ctx.strokeStyle='rgba(232,228,220,0.04)';
    ctx.lineWidth=0.35;
    ctx.stroke();
  }
}

// ── draw equator (anchor open plane) ─────────────────────────
function drawEquator(rx,ry) {
  const CX=getCX(), CY=getCY();
  const pts=[];
  for(let i=0; i<=80; i++) {
    const a=(i/80)*Math.PI*2;
    const [rx2,ry2,rz2]=rot(R*Math.cos(a), 0, R*Math.sin(a), rx,ry);
    pts.push(prj(rx2,ry2,rz2, CX,CY));
  }
  ctx.save();
  ctx.setLineDash([3,10]);
  ctx.beginPath();
  pts.forEach(([px,py],i)=>i===0?ctx.moveTo(px,py):ctx.lineTo(px,py));
  ctx.strokeStyle='rgba(232,228,220,0.18)';
  ctx.lineWidth=0.7;
  ctx.stroke();
  ctx.restore();
}

// ── draw shadow on the wall ───────────────────────────────────
// The shadow is the REAL orthographic projection of the torus
// onto a flat plane — as if light comes from directly above (or from a point)
// We use a parallel projection onto the XZ plane (collapsing Y)
// then display it in the shadow strip below

function drawShadow(rx,ry) {
  sctx.clearRect(0,0,SW,SH);

  const scx = SW/2, scy = SH*0.48;
  const scale = 0.85; // scale down to fit strip

  // background of shadow area — very dark
  sctx.fillStyle='rgba(4,4,4,0.0)';
  sctx.fillRect(0,0,SW,SH);

  // draw torus shadow outline — orthographic projection (drop Y, keep X,Z)
  // rotate the torus, then project to XZ plane
  // to get outline: sample dense grid, project, draw as faint filled region

  // use the surf grid — project rotated X,Z onto shadow plane
  // draw as dots/lines with very low alpha to show the "smear"

  // draw contour lines of the shadow
  for(let i=0; i<U; i+=2) {
    sctx.beginPath();
    let started=false;
    for(let j=0; j<=V; j++) {
      const [x,y,z]=surf[i][j];
      const [rx2,ry2,rz2]=rot(x,y,z,rx,ry);
      // orthographic shadow: collapse rY (vertical) → project onto floor
      const sx = scx + rx2*scale;
      const sy = scy + rz2*scale*0.28; // flatten z into y for perspective feel
      if(!started){ sctx.moveTo(sx,sy); started=true; }
      else sctx.lineTo(sx,sy);
    }
    sctx.strokeStyle='rgba(232,228,220,0.055)';
    sctx.lineWidth=0.5;
    sctx.stroke();
  }

  for(let j=0; j<V; j+=4) {
    sctx.beginPath();
    let started=false;
    for(let i=0; i<=U; i++) {
      const [x,y,z]=surf[i][j];
      const [rx2,ry2,rz2]=rot(x,y,z,rx,ry);
      const sx = scx + rx2*scale;
      const sy = scy + rz2*scale*0.28;
      if(!started){ sctx.moveTo(sx,sy); started=true; }
      else sctx.lineTo(sx,sy);
    }
    sctx.strokeStyle='rgba(232,228,220,0.03)';
    sctx.lineWidth=0.4;
    sctx.stroke();
  }

  // shadow trail history — the path the dot's shadow has traced
  if(shadowHist.length>1) {
    for(let i=1; i<shadowHist.length; i++) {
      const frac=i/shadowHist.length;
      const a=shadowHist[i-1], b=shadowHist[i];
      sctx.beginPath();
      sctx.moveTo(a.sx, a.sy);
      sctx.lineTo(b.sx, b.sy);
      sctx.strokeStyle=`rgba(232,228,220,${frac*0.45})`;
      sctx.lineWidth=frac*1.6;
      sctx.stroke();
    }
  }

  // dot shadow
  const last=shadowHist[shadowHist.length-1];
  if(last) {
    const sg=sctx.createRadialGradient(last.sx,last.sy,0,last.sx,last.sy,16);
    sg.addColorStop(0,'rgba(232,228,220,0.35)');
    sg.addColorStop(1,'rgba(232,228,220,0)');
    sctx.beginPath(); sctx.arc(last.sx,last.sy,16,0,Math.PI*2);
    sctx.fillStyle=sg; sctx.fill();
    sctx.beginPath(); sctx.arc(last.sx,last.sy,3,0,Math.PI*2);
    sctx.fillStyle='rgba(232,228,220,0.8)'; sctx.fill();
  }

  // vertical connector line from dot above to shadow below
  const CX=getCX(), CY=getCY();
  const [dx,dy,dz]=tPt(du,dv);
  const [rdx,rdy,rdz]=rot(dx,dy,dz,rX,rY);
  const [dpx,dpy]=prj(rdx,rdy,rdz,CX,CY);
  if(last) {
    // draw from bottom of 3D canvas to top of shadow strip
    const wallY = H - SH;
    ctx.beginPath();
    ctx.moveTo(dpx, dpy);
    ctx.lineTo(last.sx, wallY + last.sy);
    ctx.strokeStyle='rgba(232,228,220,0.04)';
    ctx.lineWidth=0.8;
    ctx.setLineDash([2,12]);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

// ── main render ───────────────────────────────────────────────
function render() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#040404';
  ctx.fillRect(0,0,W,H);

  rX += (tRX-rX)*0.06;
  rY += (tRY-rY)*0.06;
  tRY += 0.0018; // slow auto spin

  // advance dot
  du += duSpd;
  dv += dvSpd;

  const [dx,dy,dz] = tPt(du,dv);
  trail.push([dx,dy,dz]);
  if(trail.length>TRAIL) trail.shift();

  // compute shadow position
  const [rdxs,rdys,rdzs] = rot(dx,dy,dz, rX,rY);
  const scx=SW/2, scy=SH*0.48, scale=0.85;
  const shSx = scx + rdxs*scale;
  const shSy = scy + rdzs*scale*0.28;
  shadowHist.push({sx:shSx, sy:shSy});
  if(shadowHist.length>SHADOW_HIST) shadowHist.shift();

  const CX=getCX(), CY=getCY();

  // ── torus ──
  drawTorus3D(rX,rY);

  // ── equator ──
  drawEquator(rX,rY);

  // ── trail ──
  for(let i=1; i<trail.length; i++) {
    const frac=i/trail.length;
    const [ax,ay,az]=trail[i-1];
    const [bx,by,bz]=trail[i];
    const [rax,ray,raz]=rot(ax,ay,az,rX,rY);
    const [rbx,rby,rbz]=rot(bx,by,bz,rX,rY);
    const [pax,pay]=prj(rax,ray,raz,CX,CY);
    const [pbx,pby]=prj(rbx,rby,rbz,CX,CY);
    // above/below equator
    const above = ay>0;
    ctx.beginPath(); ctx.moveTo(pax,pay); ctx.lineTo(pbx,pby);
    ctx.strokeStyle = above
      ? `rgba(232,228,220,${frac*0.55})`
      : `rgba(180,175,170,${frac*0.38})`;
    ctx.lineWidth = frac*2.0;
    ctx.stroke();
  }

  // ── dot ──
  const [rdx,rdy,rdz]=rot(dx,dy,dz,rX,rY);
  const [px,py]=prj(rdx,rdy,rdz,CX,CY);

  const gl=ctx.createRadialGradient(px,py,0,px,py,22);
  gl.addColorStop(0,'rgba(232,228,220,0.5)');
  gl.addColorStop(1,'rgba(232,228,220,0)');
  ctx.beginPath(); ctx.arc(px,py,22,0,Math.PI*2);
  ctx.fillStyle=gl; ctx.fill();

  ctx.beginPath(); ctx.arc(px,py,4,0,Math.PI*2);
  ctx.fillStyle='rgba(232,228,220,0.95)'; ctx.fill();

  // ── shadow ──
  drawShadow(rX,rY);

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
